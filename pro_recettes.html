<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro-Recettes 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --card: rgba(30, 41, 59, 0.7);
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.3);
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at top right, var(--accent-glow), transparent);
    font-family: 'Urbanist', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    padding: 60px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
  .logo p { font-size: 13px; color: var(--accent); font-weight: 600; }

  #addBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .search-area { padding: 20px; }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    color: #fff;
    font-size: 16px;
    outline: none;
    backdrop-filter: blur(8px);
  }

  .grid {
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .recipe-card {
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s;
  }
  .recipe-card:active { transform: scale(0.98); }
  .card-img { width: 100%; height: 180px; object-fit: cover; background: #1e293b; }
  .card-body { padding: 20px; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .macro-pills { display: flex; gap: 8px; margin-top: 12px; }
  .macro-pill { font-size: 11px; padding: 4px 8px; border-radius: 8px; background: rgba(16, 185, 129, 0.1); color: var(--accent); font-weight: 700; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    width: 100%;
    max-width: 550px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
  }
  
  .field-label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin: 15px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
  .field { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; font-family: inherit; font-size: 15px; outline: none; }
  
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .photo-upload {
    height: 150px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background-size: cover;
    background-position: center;
  }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 16px;
    font-weight: 800;
    margin-top: 30px;
    cursor: pointer;
    font-size: 16px;
  }
  
  .close-modal { position: absolute; top: 20px; right: 20px; background: var(--card); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>👨‍🍳 ProCook</h1>
    <p id="count">0 recettes</p>
  </div>
  <button id="addBtn">+ Nouvelle</button>
</header>

<div class="search-area">
  <input type="search" class="search-input" id="searchInput" placeholder="Chercher une recette..." oninput="render()">
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem("pro_cook_data") || "[]");

function save() { localStorage.setItem("pro_cook_data", JSON.stringify(recipes)); }

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = recipes.filter(r => r.title.toLowerCase().includes(q));
  document.getElementById("count").textContent = `${recipes.length} recette${recipes.length>1?'s':''}`;
  
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="openView('${r.id}')">
      <img src="${r.img || 'https://via.placeholder.com/300x180'}" class="card-img">
      <div class="card-body">
        <div class="card-title">${r.title}</div>
        <div class="macro-pills">
          <span class="macro-pill">🔥 ${r.kcal || 0} kcal</span>
          <span class="macro-pill">💪 ${r.prot || 0}g P</span>
        </div>
      </div>
    </div>
  `).join("");
}

function openView(id) {
  const r = recipes.find(x => x.id == id);
  const m = document.getElementById("modal");
  m.innerHTML = `
    <button class="close-modal" onclick="closeOverlay()">✕</button>
    <img src="${r.img || ''}" style="width:100%; height:250px; object-fit:cover; border-radius:20px; margin-bottom:20px;">
    <h2>${r.title}</h2>
    <div class="macro-pills" style="margin: 15px 0 25px;">
      <span class="macro-pill" style="padding:8px 12px">Calories: ${r.kcal}</span>
      <span class="macro-pill" style="padding:8px 12px">P: ${r.prot}g | G: ${r.carb}g | L: ${r.fat}g</span>
    </div>
    <div class="field-label">Ingrédients</div>
    <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:20px; white-space:pre-wrap;">${r.ing}</div>
    <div class="field-label">Préparation</div>
    <div style="line-height:1.6; white-space:pre-wrap;">${r.steps}</div>
    <button class="save-btn" style="background:#334155" onclick="openForm('${r.id}')">Modifier</button>
  `;
  document.getElementById("overlay").classList.add("open");
}

function openForm(id = null) {
  const r = id ? recipes.find(x => x.id == id) : { title:"", kcal:"", prot:"", carb:"", fat:"", ing:"", steps:"", img: "" };
  const m = document.getElementById("modal");
  m.innerHTML = `
    <button class="close-modal" onclick="closeOverlay()">✕</button>
    <h2 style="margin-bottom:20px;">${id ? 'Editer' : 'Nouvelle Recette'}</h2>
    <div class="photo-upload" id="photoPreview" onclick="document.getElementById('f_file').click()" style="background-image: url('${r.img || ''}')">
      ${!r.img ? '<span>📸 Ajouter une photo</span>' : ''}
    </div>
    <input type="file" id="f_file" hidden onchange="handleFile(this)">
    <input type="hidden" id="f_img" value="${r.img || ''}">
    <label class="field-label">Titre</label>
    <input class="field" id="f_title" value="${r.title}">
    <div class="macro-grid">
      <div><label class="field-label">Calories</label><input type="number" class="field" id="f_kcal" value="${r.kcal}"></div>
      <div><label class="field-label">Protéines (g)</label><input type="number" class="field" id="f_prot" value="${r.prot}"></div>
      <div><label class="field-label">Glucides (g)</label><input type="number" class="field" id="f_carb" value="${r.carb}"></div>
      <div><label class="field-label">Lipides (g)</label><input type="number" class="field" id="f_fat" value="${r.fat}"></div>
    </div>
    <label class="field-label">Ingrédients</label>
    <textarea class="field" id="f_ing" rows="4">${r.ing || ''}</textarea>
    <label class="field-label">Etapes</label>
    <textarea class="field" id="f_steps" rows="4">${r.steps || ''}</textarea>
    <button class="save-btn" onclick="saveRecipe('${id || ''}')">Enregistrer</button>
  `;
  document.getElementById("overlay").classList.add("open");
}

function handleFile(input) {
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById("f_img").value = e.target.result;
    document.getElementById("photoPreview").style.backgroundImage = `url(${e.target.result})`;
    document.getElementById("photoPreview").innerHTML = "";
  };
  reader.readAsDataURL(input.files[0]);
}

function saveRecipe(id) {
  const data = {
    id: id || Date.now().toString(),
    title: document.getElementById("f_title").value,
    kcal: document.getElementById("f_kcal").value,
    prot: document.getElementById("f_prot").value,
    carb: document.getElementById("f_carb").value,
    fat: document.getElementById("f_fat").value,
    ing: document.getElementById("f_ing").value,
    steps: document.getElementById("f_steps").value,
    img: document.getElementById("f_img").value
  };
  if (id) recipes = recipes.map(x => x.id == id ? data : x);
  else recipes.unshift(data);
  save(); closeOverlay(); render();
}

function closeOverlay() { document.getElementById("overlay").classList.remove("open"); }
document.getElementById("addBtn").onclick = () => openForm();
render();
</script>
</body>
</html>
